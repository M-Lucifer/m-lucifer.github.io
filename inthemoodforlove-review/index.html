  <head>

    <link rel="icon" href="data:," />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background: #130906;
        color: #e7e2d7;
        overflow-y: auto;
        font-family: SimSun, "Songti SC", "STSong", serif;
      }

      canvas {
        position: fixed;
        inset: 0;
        display: block;
        width: 100vw;
        height: 100vh;
        z-index: 1;
        touch-action: pan-y;
      }

      #scroll-space {
        width: 1px;
        opacity: 0;
        pointer-events: none;
      }

      .chrome {
        position: fixed;
        inset: 0;
        z-index: 5;
        pointer-events: none;
      }

      .back {
        position: absolute;
        top: 16px;
        left: 18px;
        color: rgba(247, 244, 238, 0.86);
        text-decoration: none;
        font: 600 12px/1 "Aptos", "Segoe UI", sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        pointer-events: auto;
      }

      .hint {
        position: absolute;
        top: 16px;
        right: 18px;
        max-width: min(320px, calc(100vw - 36px));
        padding: 12px 14px;
        border-radius: 18px;
        background: rgba(16, 8, 7, 0.42);
        border: 1px solid rgba(247, 244, 238, 0.12);
        color: rgba(231, 226, 215, 0.84);
        font: 500 12px/1.35 "Aptos", "Segoe UI", sans-serif;
        box-shadow: 0 18px 36px rgba(0, 0, 0, 0.22);
        backdrop-filter: blur(12px);
        animation: hint-fadeout 0.5s ease 10s forwards;
      }

      @keyframes hint-fadeout {
        to {
          opacity: 0;
          visibility: hidden;
        }
      }
    </style>
  </head>
  <body>

    <canvas id="canvas"></canvas>
    <div id="scroll-space" aria-hidden="true"></div>

  </body>
